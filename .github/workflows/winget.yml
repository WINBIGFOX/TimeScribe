name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to publish to WinGet, for example v1.12.0
        required: true
        type: string

jobs:
  winget:
    name: Submit WinGet manifest update
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Update package in WinGet
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: WINBIGFOX.TimeScribe
          installers-regex: '\.exe$'
          token: ${{ secrets.PAT_TOKEN }}
          release-tag: ${{ inputs.release-tag || github.event.release.tag_name }}

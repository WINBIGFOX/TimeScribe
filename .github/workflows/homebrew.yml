name: Publish to Homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to publish to Homebrew, for example v1.12.0
        required: true
        type: string

jobs:
  homebrew:
    name: Bump Homebrew cask
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Derive cask version
        id: version
        env:
          TAG: ${{ inputs.release-tag || github.event.release.tag_name }}
        run: |
          set -euo pipefail

          case "$TAG" in
            v*) ;;
            *)
              echo "Expected a tag starting with 'v', got '$TAG'." >&2
              exit 1
              ;;
          esac

          echo "cask_version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email "${{ secrets.GIT_COMMIT_EMAIL }}"

          brew update
          brew bump-cask-pr \
            --version="${{ steps.version.outputs.cask_version }}" \
            --no-browse \
            timescribe

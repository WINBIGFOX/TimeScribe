name: Publish to Homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to publish to Homebrew, for example v1.12.0
        required: true
        type: string

jobs:
  homebrew:
    name: Bump Homebrew cask
    runs-on: macos-latest

    permissions:
      contents: read

    steps:
      - name: Update Homebrew cask
        uses: macauley/action-homebrew-bump-cask@v1
        with:
          token: ${{ secrets.PAT_TOKEN }}
          tap: Homebrew/homebrew-cask
          cask: timescribe
          tag: ${{ inputs.release-tag || github.event.release.tag_name }}
